<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol</title>
    <script src="https://cdn.jsdelivr.net/npm/spatial-navigation-js@1.0.4/spatial_navigation.min.js"></script>
    <style>
        :root { --bg-color: #111114; --card-bg: #22222a; --accent-color: #00ff88; --text-color: #ffffff; --text-muted: #888888; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { text-align: center; color: var(--accent-color); margin-bottom: 5px; font-size: 24px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .league-card { background-color: var(--card-bg); border-radius: 12px; min-width: 140px; padding: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; outline: none; }
        .league-card:focus, .league-card:hover { border-color: var(--accent-color); transform: scale(1.05); background-color: #2a2a35; }
        .league-emoji { font-size: 35px; margin-bottom: 8px; }
        .league-name { margin: 0; font-size: 14px; font-weight: bold; }
        .content-area { margin-top: 20px; display: none; background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: transparent; color: var(--text-muted); border: 2px solid transparent; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; outline: none; }
        .tab-btn:focus, .tab-btn:hover { border-color: var(--text-color); color: var(--text-color); }
        .tab-btn.active { background-color: var(--accent-color); color: #000; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; }
        th { color: var(--accent-color); font-weight: bold; text-transform: uppercase; }
        .loader { text-align: center; padding: 40px; font-size: 16px; color: var(--accent-color); display: none; }
        .panel { display: none; } .panel.active { display: block; }
    </style>
</head>
<body>

    <h1>⚽ Esportes</h1>
    <p class="subtitle">Selecione o campeonato para carregar os dados reais</p>

    <div class="carousel" id="league-carousel"></div>
    <div class="loader" id="loader">Conectando aos servidores esportivos... ⏳</div>

    <div class="content-area" id="content-area">
        <h2 id="league-title" style="margin-top: 0; font-size: 18px;">Campeonato</h2>
        <div class="tabs">
            <button class="tab-btn sn-focusable active" onclick="switchTab('standings', this)">Classificação</button>
            <button class="tab-btn sn-focusable" onclick="switchTab('fixtures', this)">Próximos Jogos</button>
        </div>
        <div id="standings" class="panel active">
            <table>
                <thead><tr><th>Pos</th><th>Equipe</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead>
                <tbody id="standings-body"></tbody>
            </table>
        </div>
        <div id="fixtures" class="panel">
            <table>
                <thead><tr><th>Data</th><th style="text-align: right;">Mandante</th><th style="text-align: center;">X</th><th>Visitante</th><th>Status</th></tr></thead>
                <tbody id="fixtures-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // INICIA O NAVEGADOR DO CONTROLE REMOTO DA TV
        window.addEventListener('load', function() {
            SpatialNavigation.init();
            SpatialNavigation.add({ selector: '.sn-focusable' });
            SpatialNavigation.makeFocusable();
            SpatialNavigation.focus();
        });

        // COLOQUE SUA CHAVE AQUI!
        const API_KEY = 'COLOQUE_SUA_API_KEY_AQUI'; 
        const BASE_URL = 'https://api.football-data.org/v4/competitions/';

        const leagues = [
            { id: 'PL', name: 'Premier League', logo: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
            { id: 'PD', name: 'La Liga', logo: '🇪🇸' },
            { id: 'SA', name: 'Serie A', logo: '🇮🇹' },
            { id: 'BL1', name: 'Bundesliga', logo: '🇩🇪' },
            { id: 'CL', name: 'Champions League', logo: '⭐' },
            { id: 'BSA', name: 'Brasileirão', logo: '🇧🇷' }
        ];

        const carousel = document.getElementById('league-carousel');
        leagues.forEach(league => {
            const card = document.createElement('div');
            card.className = 'league-card sn-focusable'; // sn-focusable permite selecionar com a TV
            card.innerHTML = `<div class="league-emoji">${league.logo}</div><h3 class="league-name">${league.name}</h3>`;
            card.onclick = () => fetchLeagueData(league.id, league.name);
            
            // Suporte para o botão OK do controle remoto
            card.addEventListener('keydown', (e) => { if (e.key === 'Enter') fetchLeagueData(league.id, league.name); });
            carousel.appendChild(card);
        });

        async function fetchLeagueData(leagueId, leagueName) {
            document.getElementById('content-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('league-title').innerText = leagueName;

            try {
                const config = { headers: { 'X-Auth-Token': API_KEY } };
                const [standingsRes, fixturesRes] = await Promise.all([
                    fetch(`${BASE_URL}${leagueId}/standings`, config),
                    fetch(`${BASE_URL}${leagueId}/matches?status=SCHEDULED`, config)
                ]);

                if (!standingsRes.ok) throw new Error("Falha na API.");

                const standingsData = await standingsRes.json();
                const fixturesData = await fixturesRes.json();

                renderStandings(standingsData);
                renderFixtures(fixturesData);

                document.getElementById('loader').style.display = 'none';
                document.getElementById('content-area').style.display = 'block';
                switchTab('standings', document.querySelector('.tab-btn'));
                SpatialNavigation.makeFocusable(); // Recalcula o foco da TV
            } catch (error) {
                document.getElementById('loader').innerText = '❌ Erro de Conexão ou API Key inválida.';
            }
        }

        function renderStandings(data) {
            const tbody = document.getElementById('standings-body');
            tbody.innerHTML = '';
            if (!data.standings || data.standings.length === 0) return tbody.innerHTML = '<tr><td colspan="8">Sem dados.</td></tr>';
            data.standings[0].table.forEach(row => {
                tbody.innerHTML += `<tr><td>${row.position}º</td><td>${row.team.shortName}</td><td style="color:#00ff88; font-weight:bold;">${row.points}</td><td>${row.playedGames}</td><td>${row.won}</td><td>${row.draw}</td><td>${row.lost}</td><td>${row.goalDifference}</td></tr>`;
            });
        }

        function renderFixtures(data) {
            const tbody = document.getElementById('fixtures-body');
            tbody.innerHTML = '';
            if (!data.matches || data.matches.length === 0) return tbody.innerHTML = '<tr><td colspan="5">Sem jogos.</td></tr>';
            data.matches.slice(0, 15).forEach(m => {
                const d = new Date(m.utcDate).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit' });
                tbody.innerHTML += `<tr><td>${d}</td><td style="text-align:right;">${m.homeTeam.shortName}</td><td style="text-align:center;">X</td><td>${m.awayTeam.shortName}</td><td style="color:#00ff88;">Agendado</td></tr>`;
            });
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
