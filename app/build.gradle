plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.signalplay.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.signalplay.tv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // Estas são as linhas novas que resolvem o conflito do Java 17:
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}
