plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    // Aplica o plugin do Google Services
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.signalplay.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.signalplay.tv"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

// Bloco novo: Aqui dizemos para o aplicativo baixar as ferramentas do Firebase
dependencies {
    // Importa a BOM do Firebase (ela gerencia as versões corretas automaticamente)
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    
    // Adiciona o motor do banco de dados Firestore (para validar usuário e senha)
    implementation 'com.google.firebase:firebase-firestore'
}
