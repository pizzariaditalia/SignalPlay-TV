name: Fabricar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK na Nuvem
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar os arquivos
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🧹 Operação Faxina (Deleta arquivos fantasmas)
        run: |
          find . -name "AndroidManifest.xml" -type f -delete
          mkdir -p app/src/main
          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/xml/android">' >> app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.software.leanback" android:required="true" />' >> app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />' >> app/src/main/AndroidManifest.xml
          echo '    <application android:allowBackup="true" android:label="Signal Play TV" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">' >> app/src/main/AndroidManifest.xml
          echo '        <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">' >> app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />' >> app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '        </activity>' >> app/src/main/AndroidManifest.xml
          echo '    </application>' >> app/src/main/AndroidManifest.xml
          echo '</manifest>' >> app/src/main/AndroidManifest.xml

      - name: 🐘 Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: 🚀 Compilar o APK
        run: gradle assembleDebug --stacktrace
        
      - name: 🚨 Relatório de Erro Automático (Somente se falhar)
        if: failure()
        run: |
          echo "### ❌ O ERRO ACONTECEU AQUI:" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat app/build/outputs/logs/manifest-merger-debug-report.txt >> $GITHUB_STEP_SUMMARY || echo "Erro de compilação geral, abra a tela preta." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📦 Disponibilizar o APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-APK
          path: app/build/outputs/apk/debug/*.apk
