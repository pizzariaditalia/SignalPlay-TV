name: Fabricar APK Android

on:
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK na Nuvem
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar os arquivos
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📝 Escrever Manifesto Limpo
        run: |
          find . -name "AndroidManifest.xml" -type f -delete
          mkdir -p app/src/main
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-feature android:name="android.software.leanback" android:required="true" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <application
                  android:allowBackup="true"
                  android:label="Signal Play TV"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  
                  <activity
                      android:name=".LoginActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".MainActivity"
                      android:exported="false"
                      android:screenOrientation="landscape" />

              </application>
          </manifest>
          EOF

      - name: 🐘 Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: 🚀 Compilar o APK
        run: gradle assembleDebug

      - name: 📦 Disponibilizar o APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-APK
          path: app/build/outputs/apk/debug/*.apk
