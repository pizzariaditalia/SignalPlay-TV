name: Gerar APK SignalPlay TV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Essa é a mágica: força o GitHub a usar a versão correta do motor
      - name: Instalar Gradle Compatível
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Construir o APK
        run: gradle assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-APK
          path: app/build/outputs/apk/debug/app-debug.apk
