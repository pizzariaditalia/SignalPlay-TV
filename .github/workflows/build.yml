name: Gerar APK SignalPlay TV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite que você clique em um botão para compilar manualmente quando quiser

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Construir o APK
        run: ./gradlew assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-APK
          path: app/build/outputs/apk/debug/app-debug.apk
