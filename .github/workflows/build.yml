name: Gerar APK SignalPlay TV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle Compatível
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Construir o APK (Release)
        run: gradle assembleRelease

      # =========================================================================
      # ASSINATURA BLINDADA: Tratamento de espaços no Base64 e Senhas Especiais!
      # =========================================================================
      - name: Assinar APK Oficial (Modo Seguro)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 1. Limpa QUALQUER espaço ou quebra de linha acidental do seu Base64
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > blindagem.jks
          
          # 2. Pega a ferramenta Android mais atualizada
          BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/* | tail -1)
          
          # 3. Alinha a memória do APK
          $BUILD_TOOLS/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          
          # 4. Assina o APK injetando a senha direto da memória (ignora caracteres especiais)
          $BUILD_TOOLS/apksigner sign --ks blindagem.jks --ks-key-alias "key0" --ks-pass env:KEYSTORE_PASSWORD --key-pass env:KEY_PASSWORD --out SignalPlay-TV-Oficial.apk app-release-aligned.apk

      - name: Disponibilizar APK Assinado para Download
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-Oficial-Assinado
          path: SignalPlay-TV-Oficial.apk
