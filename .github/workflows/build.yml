name: Gerar APK SignalPlay TV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle Compatível
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Construir o APK (Release)
        run: gradle assembleRelease

      # =========================================================================
      # ASSINATURA RAIZ: Com tradutor de criptografia do Java 21 para o Android!
      # =========================================================================
      - name: Assinar APK Oficial (Modo Terminal)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 1. Descompacta o seu texto Base64
          echo "$KEYSTORE_BASE64" | base64 --decode > blindagem_original.jks
          
          # 2. TRADUTOR DE CHAVES: Rebaixa a chave super-criptografada do PC do Arthur para o formato clássico JKS que o Android ama!
          keytool -importkeystore -srckeystore blindagem_original.jks -srcstorepass "$KEYSTORE_PASSWORD" -destkeystore blindagem.jks -deststoretype JKS -deststorepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD"
          
          # 3. Pega a ferramenta Android mais atualizada
          BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/* | tail -1)
          
          # 4. Alinha a memória do APK (Otimização obrigatória do Android)
          $BUILD_TOOLS/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          
          # 5. Assina com a chave traduzida (forçando o alias 'key0' para evitar espaços indesejados)
          $BUILD_TOOLS/apksigner sign --ks blindagem.jks --ks-key-alias "key0" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEY_PASSWORD" --out SignalPlay-TV-Oficial.apk app-release-aligned.apk

      - name: Disponibilizar APK Assinado para Download
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-Oficial-Assinado
          path: SignalPlay-TV-Oficial.apk
