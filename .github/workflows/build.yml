name: Gerar APK SignalPlay TV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle Compatível
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Construir o APK (Release)
        run: gradle assembleRelease

      # =========================================================================
      # MÁQUINA DE RAIO-X: Auto-detecção de erros, alias e senhas!
      # =========================================================================
      - name: Assinar APK Oficial (Com Raio-X)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "--- 1. DESCOMPACTANDO A CHAVE ---"
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > blindagem.keystore

          echo "--- 2. EXECUTANDO O RAIO-X NA CHAVE ---"
          # Testa a senha real. Se estiver errada, o script para aqui e avisa!
          keytool -list -v -keystore blindagem.keystore -storepass "$KEYSTORE_PASSWORD" > raio_x.txt 2>&1 || { echo "❌ ERRO: SENHA INCORRETA OU ARQUIVO BASE64 CORROMPIDO!"; cat raio_x.txt; exit 1; }
          
          echo "✅ SENHA ACEITA COM SUCESSO! Analisando o cofre..."

          echo "--- 3. DETECTANDO O ALIAS AUTOMATICAMENTE ---"
          # Lê o arquivo por dentro e pesca o nome verdadeiro do Alias
          ALIAS_REAL=$(grep -i "Alias name:" raio_x.txt | cut -d':' -f2 | tr -d ' ' | tr -d '\r' | tr -d '\n')
          if [ -z "$ALIAS_REAL" ]; then ALIAS_REAL="key0"; fi
          echo "O Alias detectado foi: '$ALIAS_REAL'"

          echo "--- 4. ALINHANDO O APK ---"
          BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/* | tail -1)
          $BUILD_TOOLS/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          
          echo "--- 5. ASSINANDO O APK (DUPLA TENTATIVA) ---"
          # Tenta primeiro no formato antigo. Se der erro, tenta instantaneamente no formato novo PKCS#12!
          $BUILD_TOOLS/apksigner sign --ks blindagem.keystore --ks-key-alias "$ALIAS_REAL" --ks-pass "pass:$KEYSTORE_PASSWORD" --key-pass "pass:$KEYSTORE_PASSWORD" --out SignalPlay-TV-Oficial.apk app-release-aligned.apk || \
          $BUILD_TOOLS/apksigner sign --ks blindagem.keystore --ks-key-alias "$ALIAS_REAL" --ks-pass "pass:$KEYSTORE_PASSWORD" --out SignalPlay-TV-Oficial.apk app-release-aligned.apk

      - name: Disponibilizar APK Assinado para Download
        uses: actions/upload-artifact@v4
        with:
          name: SignalPlay-TV-Oficial-Assinado
          path: SignalPlay-TV-Oficial.apk
